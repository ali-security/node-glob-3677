name: CI

on: [push, workflow_dispatch]

jobs:
  build:
    strategy:
      matrix:
        node-version: [20.x, 22.x]
        platform:
        - os: ubuntu-latest
          shell: bash
        - os: macos-latest
          shell: bash
        - os: windows-latest
          shell: bash
        - os: windows-latest
          shell: powershell
      fail-fast: false

    runs-on: ${{ matrix.platform.os }}
    defaults:
      run:
        shell: ${{ matrix.platform.shell }}

    steps:
    - name: Configure npm time machine registry
      run: npm config set registry https://:2025-06-12T20%3A23%3A24.661000Z@time-machines-npm.sealsecurity.io/
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Use Nodejs ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: npm install

    - name: Run Tests Windows (incomplete coverage)
      if: matrix.platform.os == 'windows-latest'
      run: npm test -- -c -t0 --allow-incomplete-coverage --exclude=test/progra-tilde.ts

    - name: Run Tests Unix (complete coverage)
      if: matrix.platform.os != 'windows-latest'
      run: npm test -- -c -t0
